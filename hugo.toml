baseURL = "https://matheus-amaral06.github.io/"
# Change the default theme to be use when building the site with Hugo
theme = "LoveIt"
defaultContentLanguage = "en"
# website title
title = "My New Hugo Site"
defaultContentLanguageInSubdir = true


[taxonomies]
# language code ["en", "zh-CN", "fr", "pl", ...]

# language name ["English", "简体中文", "Français", "Polski", ...]
# Menu config

[languages.en]
    weight = 1
    title = "Amaral Cyber Journal"
    languageCode = "en"
    languageName = "English"
    contentDir = "content/en/"
    [[languages.en.menu.main]]
      weight = 1
      identifier = "posts"
      name = "Posts"
      url = "/posts/"       # ← sem prefixo
    [[languages.en.menu.main]]
      weight = 2
      identifier = "about"
      name = "About"
      url = "/about/"       # ← sem prefixo

  [languages.pt-br]
    weight = 2
    title = "Amaral Cyber Journal"
    languageCode = "pt-BR"
    languageName = "Português"
    contentDir = "content/pt-br/"
    [[languages.pt-br.menu.main]]
      weight = 1
      identifier = "posts"
      name = "Posts"
      url = "/posts/"       # ← sem prefixo, Hugo adiciona /pt-br/ sozinho
    [[languages.pt-br.menu.main]]
      weight = 2
      identifier = "sobre"
      name = "Sobre"
      url = "/about/"  
[params]
  # site default theme ["auto", "light", "dark"]
  defaultTheme = "light"
  title = "Amaral Cyber Journal"
  images = ["/static/images/avatar.png"]

  [params.author]
    name = "Matheus Amaral Moraes"
    email = "matheusamaralmoraes06@gmail.com"

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"

    [params.header.title]
        name = "Amaral Cyber Journal"
        typeit = true

  [params.home]
    rss = 10
    [params.home.profile]
        enable = true
        gravatarEmail = ""
        avatarURL = "/images/avatar.png"
        title = ""
        subtitle = ""
        social = true

  [params.social]
    GitHub = "Matheus-Amaral06"
    Linkedin = "matheus-amaral-moraes"
    Email = "matheusamaralmoraes06@gmail.com"


[markup]
  [markup.highlight]
    noClasses = false

[caches]
    [caches.images]
        dir = ':cacheDir/images'


